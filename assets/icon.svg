<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pulse app icon — emerald lowercase "p" on zinc-950.
  This is the source of truth. Convert to the PNG sizes listed below
  with `npx expo-optimize` or any vector tool.

    1024×1024  →  assets/icon.png
    1024×1024  →  assets/adaptive-icon.png  (transparent foreground for Android)
    1242×2436  →  assets/splash.png
       48×48   →  assets/favicon.png

  Tip: bake-in some safe-area padding for the adaptive icon — Android
  masks the outer ~15% in some launchers.
-->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="1024" height="1024" rx="220" fill="#09090b"/>

  <!-- subtle inner ring for depth -->
  <rect x="6" y="6" width="1012" height="1012" rx="216"
        fill="none" stroke="rgba(16,185,129,0.18)" stroke-width="2"/>

  <!-- monogram -->
  <g transform="translate(298 230)">
    <!-- Stem -->
    <rect x="0" y="0" width="120" height="600" rx="32" fill="#10b981"/>
    <!-- Bowl of the "p" -->
    <path d="M120 0 H310 a200 200 0 0 1 0 400 H120 V0 Z"
          fill="#10b981"/>
  </g>
</svg>
